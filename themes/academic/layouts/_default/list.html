{{ define "main" }}
<h2>{{ .Title }}</h2>
{{ range .Pages }}
<article class="post-card">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <div class="meta">
        <time>{{ .Date.Format "2006-01-02" }}</time>
        {{ range .Params.tags }}
        <a href="/tags/{{ . }}/" class="tag">#{{ . }}</a>
        {{ end }}
    </div>
    <p>{{ .Summary | truncate 150 }}</p>
</article>
{{ end }}
{{ end }}
